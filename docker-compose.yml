# w0pium — base compose (production-style)
#
# public/ is copied into the image (Dockerfile: COPY public/). This file does NOT
# bind-mount ./public, because a host mount would hide the image copy and
# `docker compose up --build` would not ship UI from the build — you would only
# see whatever was already on disk under ./public.
#
# Optional: for local edits to ./public without rebuild, copy
# docker-compose.override.example.yml to docker-compose.override.yml (gitignored).

version: "3.8"

services:
  w0pium:
    build: .
    container_name: w0pium
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      # Persist DB and user media only (see file header for public/)
      - ./data:/data
    env_file:
      - .env
    environment:
      - PORT=3000
      - DATA_DIR=/data
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: w0pium-cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    depends_on:
      - w0pium
